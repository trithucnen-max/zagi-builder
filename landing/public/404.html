<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Zagi</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Redirects all 404s back to index.html with the path encoded in the query string
      var pathSegmentsToKeep = 1; // number of path segments in the repo name (1 = /zagi-builder)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
