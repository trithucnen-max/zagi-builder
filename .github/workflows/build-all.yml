# ─── Build Zagi — Windows + macOS cùng lúc ─────────────────────────────────
# Tự động build khi push lên main, publish khi push tag v*
# ─────────────────────────────────────────────────────────────────────────────

name: Build All Platforms

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # ── Push tag v* → Build + Publish Release tự động ────────────────────────
  push:
    tags:
      - 'v*'
    # ── Push lên main → Build only (không publish) ─────────────────────────
    branches:
      - main

  # ── Trigger thủ công từ GitHub UI ────────────────────────────────────────
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      tag_name:
        description: 'Tag cho release (vd: v26.4.3). Bỏ trống = tự lấy từ package.json'
        required: false
        default: ''
        type: string

# ─── SECRETS cần cấu hình ────────────────────────────────────────────────────
#   GH_TOKEN — GitHub Personal Access Token (repo scope)

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Resolve tag một lần — chia sẻ cho cả 2 job build
  # ═══════════════════════════════════════════════════════════════════════════
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
      should_publish: ${{ steps.get_tag.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
      - name: 🏷️ Resolve tag
        id: get_tag
        shell: bash
        run: |
          SHOULD_PUBLISH="false"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Push tag v* → tự động publish Release
            TAG="${GITHUB_REF_NAME}"
            SHOULD_PUBLISH="true"
          elif [[ "$GITHUB_REF" == refs/heads/* ]]; then
            # Push branch (main) → build only, không publish
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            SHOULD_PUBLISH="false"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
            SHOULD_PUBLISH="${{ github.event.inputs.publish }}"
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            SHOULD_PUBLISH="${{ github.event.inputs.publish || 'false' }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "should_publish=${SHOULD_PUBLISH}" >> $GITHUB_OUTPUT
          echo "✅ Tag: ${TAG} | Publish: ${SHOULD_PUBLISH}"

  # ═══════════════════════════════════════════════════════════════════════════
  # Windows (x64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-windows:
    needs: resolve-tag
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 💾 Cache node_modules (Windows)
        uses: actions/cache@v4
        id: cache-modules-win
        with:
          path: node_modules
          key: win-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: win-node22-

      - name: 📦 Install dependencies
        if: steps.cache-modules-win.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps
        env:
          SKIP_ICON_PATCH: 'true'
          CI: 'true'

      - name: 📦 Fix Rollup and Esbuild optional dependencies for Windows
        run: |
          node -e "
            const { execSync } = require('child_process');
            const rollupVer = require('./node_modules/rollup/package.json').version;
            const esbuildVer = require('./node_modules/esbuild/package.json').version;
            console.log('Rollup version:', rollupVer);
            console.log('Esbuild version:', esbuildVer);
            execSync('npm install --no-save @rollup/rollup-win32-x64-msvc@' + rollupVer, { stdio: 'inherit' });
            execSync('npm install --no-save @esbuild/win32-x64@' + esbuildVer, { stdio: 'inherit' });
          "

      - name: 🏗️ Compile TypeScript (electron)
        run: npx tsc -p tsconfig.electron.prod.json

      - name: 🏗️ Build renderer (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          BUILD_TARGET: production

      - name: 📦 Build Windows app (x64)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      - name: 📋 List build output (debug)
        if: always()
        shell: bash
        run: |
          echo "=== dist-electron-build/ ==="
          ls -la dist-electron-build/ 2>/dev/null || echo "⚠️ dist-electron-build/ not found!"
          echo "=== dist/ ==="
          ls -la dist/ 2>/dev/null | head -5 || echo "⚠️ dist/ not found!"
          echo "=== dist-electron/ ==="
          ls -la dist-electron/ 2>/dev/null | head -5 || echo "⚠️ dist-electron/ not found!"

      - name: ⬆️ Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Zagi-Windows-${{ needs.resolve-tag.outputs.tag }}
          path: |
            dist-electron-build/*.exe
            dist-electron-build/latest.yml
          if-no-files-found: warn
          retention-days: 7

      - name: 🚀 Publish Windows → GitHub Releases
        if: needs.resolve-tag.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: "Zagi ${{ needs.resolve-tag.outputs.tag }}"
          files: |
            dist-electron-build/*.exe
            dist-electron-build/*.blockmap
            dist-electron-build/latest.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: false

  # ═══════════════════════════════════════════════════════════════════════════
  # macOS (arm64 — Apple Silicon)
  # ═══════════════════════════════════════════════════════════════════════════
  build-mac-arm64:
    needs: resolve-tag
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 💾 Cache node_modules (macOS)
        uses: actions/cache@v4
        id: cache-modules-mac
        with:
          path: node_modules
          key: mac-node22-${{ hashFiles('package-lock.json') }}
          restore-keys: mac-node22-

      - name: 📦 Install dependencies
        if: steps.cache-modules-mac.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Compile TypeScript (electron)
        run: npx tsc -p tsconfig.electron.prod.json

      - name: 🏗️ Build renderer (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          BUILD_TARGET: production

      - name: 📦 Build macOS app (arm64)
        run: npx electron-builder --mac --arm64 --publish never

      - name: ⬆️ Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zagi-macOS-arm64-${{ needs.resolve-tag.outputs.tag }}
          path: |
            dist-electron-build/*.dmg
            dist-electron-build/latest-mac.yml
          retention-days: 7

      - name: 🚀 Publish macOS → GitHub Releases
        if: needs.resolve-tag.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: "Zagi ${{ needs.resolve-tag.outputs.tag }}"
          files: |
            dist-electron-build/*.dmg
            dist-electron-build/*.blockmap
            dist-electron-build/latest-mac.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
