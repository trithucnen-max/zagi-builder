# ─── Build Deplao cho Windows ────────────────────────────────────────────────
# Trigger: push tag v* HOẶC chạy tay (workflow_dispatch)
# ─────────────────────────────────────────────────────────────────────────────

name: Build Windows

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      tag_name:
        description: 'Tag cho release (vd: v26.4.0). Bỏ trống = tự lấy từ package.json'
        required: false
        default: ''
        type: string

  push:
    tags:
      - 'v*'

# ─── SECRETS cần cấu hình ────────────────────────────────────────────────────
#   GH_TOKEN — GitHub Personal Access Token (repo scope)

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Compile TypeScript (electron)
        run: npx tsc -p tsconfig.electron.prod.json

      - name: 🏗️ Build renderer (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          BUILD_TARGET: production

      - name: 🏷️ Xác định tag name
        id: get_tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "✅ Tag: $(grep '^tag=' $GITHUB_OUTPUT | cut -d= -f2)"

      - name: 📦 Build Windows app (x64)
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: 🚀 Publish lên GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: babyvibe/deplao-builder
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "Deplao ${{ steps.get_tag.outputs.tag }}"
          files: |
            dist-electron-build/*.exe
            dist-electron-build/*.blockmap
            dist-electron-build/latest.yml
          token: ${{ secrets.GH_TOKEN }}
          draft: false
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: false

      # ─── File .exe sau khi publish ───────────────────────────────────────────
      # Xem release tại: https://github.com/babyvibe/deplao-builder/releases
      # Link tải cố định:
      #   https://github.com/babyvibe/deplao-builder/releases/latest/download/Deplao-Setup-{version}.exe

