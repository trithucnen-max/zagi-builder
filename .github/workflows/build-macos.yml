# ─── Build macOS (chạy tay riêng lẻ) ───────────────────────────────────────
# Chạy trên macOS runner (GitHub Actions) vì:
#   1. bytenode compile V8 bytecode PHẢI chạy trên target OS + arch
#   2. ffmpeg-static download binary theo platform khi npm install
#   3. electron-builder cần macOS để tạo .dmg
#
# Workflow này chỉ chạy tay (workflow_dispatch).
# Khi push tag v* → dùng build-all.yml để tránh build trùng lặp.
# ─────────────────────────────────────────────────────────────────────────────

name: Build macOS

# Cấp quyền write để tạo GitHub Release
permissions:
  contents: write

# Opt-in Node.js 24 để tắt warning deprecation Node.js 20
# (bắt buộc từ June 2, 2026 — xem https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Chạy tay từ Actions tab
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      tag_name:
        description: 'Tag cho release (vd: v26.2.7-mac). Bỏ trống = tự lấy từ package.json'
        required: false
        default: ''
        type: string

# ─── SECRETS cần cấu hình trong GitHub repo Settings → Secrets ──────────────
# Bắt buộc:
#   GH_TOKEN          — GitHub Personal Access Token (repo scope)
#
# Tùy chọn (Code Signing - thêm sau nếu có Apple Developer Account):
#   CSC_LINK           — Base64 của file .p12 certificate
#   CSC_KEY_PASSWORD   — Password của .p12
#   APPLE_ID           — Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD — App-specific password
#   APPLE_TEAM_ID      — Apple Developer Team ID

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Build cho Intel Mac (x64)
  # Intel Mac giờ rất hiếm (< 5% market), chỉ cần build arm64
  # Xóa toàn bộ job build-mac-x64
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # Build cho Apple Silicon Mac (arm64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-mac-arm64:
    runs-on: macos-14  # Apple Silicon (M1) runner
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🟢 Setup Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build bridge E2EE (Go)
        run: npm run build:bridge-e2ee

      - name: 🏗️ Compile TypeScript (electron)
        run: npx tsc -p tsconfig.electron.prod.json

      - name: 🏗️ Build renderer (Vite)
        run: npx vite build
        env:
          NODE_ENV: production
          BUILD_TARGET: production

      - name: 🏷️ Xác định tag name
        id: get_tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        run: |
          # Ưu tiên 1: Input thủ công từ workflow_dispatch
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          # Ưu tiên 2: Tag từ git push (refs/tags/v*)
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          # Ưu tiên 3: Lấy từ package.json — KHÔNG có hậu tố -mac
          # (phải khớp với tag Windows để electron-updater tìm đúng latest-mac.yml)
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "✅ Tag: $(grep '^tag=' $GITHUB_OUTPUT | cut -d= -f2)"

      - name: 📦 Build macOS app (arm64 & x64)
        run: npx electron-builder --mac zip --x64 --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: 🛠️ Manually create DMG for all macOS architectures
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for app_path in dist-electron-build/*/Zagi.app; do
            if [ -d "$app_path" ]; then
              folder_name=$(basename $(dirname "$app_path"))
              echo "Found app at $app_path (folder: $folder_name)"
              target_dir=$(dirname "$app_path")
              
              # Create Applications folder symlink and copy instructions inside the DMG
              ln -s /Applications "$target_dir/Applications"
              cat << 'EOF' | sed 's/^              //' > "$target_dir/HUONG_DAN_CAI_DAT_MACOS.txt"
              HƯỚNG DẪN CÀI ĐẶT TRÊN MACOS (CHO BẢN CHƯA KÝ SỐ)
              ================================================

              1. Kéo thả file "Zagi" vào thư mục "Applications" bên cạnh để cài đặt.
              2. Nếu mở ứng dụng báo lỗi "Zagi bị hỏng..." (App is damaged...):
                 - Mở ứng dụng Terminal trên máy Mac của bạn.
                 - Sao chép và dán dòng lệnh sau đây vào Terminal rồi nhấn Enter:

                   sudo xattr -rd com.apple.quarantine /Applications/Zagi.app

                 - Nhập mật khẩu máy Mac của bạn khi được yêu cầu (khi gõ mật khẩu sẽ không hiển thị ký tự, bạn cứ gõ đúng mật khẩu rồi nhấn Enter).
              3. Sau khi chạy lệnh trên, bạn có thể mở ứng dụng Zagi bình thường từ Launchpad hoặc thư mục Applications.
              EOF

              if [ "$folder_name" = "mac-arm64" ]; then
                echo "Creating DMG for ARM64..."
                hdiutil create -fs HFS+ -srcfolder "$target_dir" -volname "Zagi" "dist-electron-build/Zagi-${VERSION}-arm64.dmg"
              elif [ "$folder_name" = "mac" ] || [ "$folder_name" = "mac-x64" ]; then
                echo "Creating DMG for x64..."
                hdiutil create -fs HFS+ -srcfolder "$target_dir" -volname "Zagi" "dist-electron-build/Zagi-${VERSION}.dmg"
              fi
              
              # Clean up temporary resources in source folder
              rm -f "$target_dir/Applications"
              rm -f "$target_dir/HUONG_DAN_CAI_DAT_MACOS.txt"
            fi
          done

      - name: 🚀 Publish .dmg lên deplao-builder
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: trithucnen-max/zagi-builder
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "Zagi ${{ steps.get_tag.outputs.tag }}"
          files: |
            dist-electron-build/*.zip
            dist-electron-build/*.dmg
            dist-electron-build/*.blockmap
            dist-electron-build/latest-mac.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false

      # ─── File .dmg sau khi publish ──────────────────────────────────────────
      # Xem release tại: https://github.com/trithucnen-max/zagi-builder/releases
      # Link tải cố định:
      #   https://github.com/trithucnen-max/zagi-builder/releases/latest/download/Zagi-{version}-arm64.dmg
      # ─────────────────────────────────────────────────────────────────────────

